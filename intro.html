<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction To HTML</title>
</head>
<body>
    
    <!-- HTML Heading -->
     <h1>Heading 1</h1>
     <h2>Heading 2</h2>
     <h3>Heading 3</h3>
     <h4>Heading 4</h4>
     <h5>Heading 5</h5>
     <h6>Heading 6</h6>
     

    <!-- HTML horizontal rule [hr tag] -->
     <hr>

    <!-- HTML Paragraph -->
     <p>This text is written using p tag</p>

     <pre>This text is
        written using
        pre tag
     </pre>

     <p>This text is written using p tag <br> with line break br</p>


    <hr>


    <!-- HTML Hyperlinks -->
      <h3>HTML Hyperlink</h3>
      <a href="https://www.google.com" target="_blank">Go to Google</a> <br> <br>
      <a href="https://www.w3schools.com" target="_blank">W3Schools</a>


    <hr>

    <!-- HTML Images -->
     <img src="./boy.jpg" alt="" height="200" width="150" style="border: 1px solid black;"> &nbsp;&nbsp;&nbsp;
     <img src="./girl.jpg" alt="" height="200" width="200">

    <hr>

</body>
</html>
